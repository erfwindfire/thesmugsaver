# 5d. Non-trailing-slash to trailing-slash for article URLs
# (trailingSlash: true in next.config.js generates index.html per directory;
#  Netlify needs these rules to handle legacy non-slash indexed URLs)
[[redirects]]
  from = "/:category/:slug"
  to = "/:category/:slug/"
  status = 301

# 5e. Non-trailing-slash to trailing-slash for category URLs
[[redirects]]
  from = "/:category"
  to = "/:category/"
  status = 301

# 7. Custom 404 (must be last redirect rule)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ──────────────────────────────────────
# SECURITY HEADERS
# ──────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# ──────────────────────────────────────
# CACHE HEADERS
# ──────────────────────────────────────

# Next.js hashed static assets — cache forever
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — cache for 1 year
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts — cache for 1 year
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages — cache briefly, revalidate
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sitemap and robots — revalidate frequently
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
